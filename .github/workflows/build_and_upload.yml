name: Build and Upload

on:
  workflow_call:
    inputs:
      isRelease:
        required: true
        type: boolean
      shouldUpload:
        required: true
        type: boolean

env:
  CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
  CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
  SIGNING_KEY: ${{ secrets.PGP_SECRET }}
  SIGNING_PASSWORD: ${{ secrets.PGP_PASSPHRASE }}

jobs:
  build_windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: 25

      - name: Set up MinGW
        uses: msys2/setup-msys2@v2

      - name: Set up Developer Command Prompt
        uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: x64

      - name: Append the directory of 'vcvarsall.bat' to PATH environment variable
        uses: myci-actions/export-env-var-powershell@1
        with:
          name: PATH
          value: $env:PATH;C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build

      - name: Build runtime JNI project
        run: ./gradlew idl_helper_build_project_windows64_jni

      - name: Build runtime FFM project
        run: ./gradlew idl_helper_build_project_windows64_ffm

      - name: Build TestLib JNI project
        run: ./gradlew TestLib_build_project_windows64_jni

      - name: Build TestLib FFM project
        run: ./gradlew TestLib_build_project_windows64_ffm

      - name: Run TestLib desktop JNI tests
        run: ./gradlew :examples:TestLib:lib:lib-jni:assemble :examples:TestLib:app:desktop-jni:test --no-daemon --info --console=plain

      - name: Run TestLib desktop FFM tests
        run: ./gradlew :examples:TestLib:lib:lib-ffm:assemble :examples:TestLib:app:desktop-ffm:test --no-daemon --info --console=plain

      - name: Build Shared LibA JNI project
        run: ./gradlew LibA_build_project_windows64_jni

      - name: Build Shared LibA FFM project
        run: ./gradlew LibA_build_project_windows64_ffm

      - name: Build Shared LibB JNI project
        run: ./gradlew LibB_build_project_windows64_jni

      - name: Build Shared LibB FFM project
        run: ./gradlew LibB_build_project_windows64_ffm

      - name: Upload natives
        uses: actions/upload-artifact@v4
        with:
          name: windows-natives
          path: ./idl/runtime/runtime-build/build/c++/libs/

  build_linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: 25

      - name: Set up MinGW
        run: |
          sudo apt install -y --force-yes mingw-w64 lib32z1

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Build runtime JNI project
        run: ./gradlew idl_helper_build_project_linux64_jni

      - name: Build runtime FFM project
        run: ./gradlew idl_helper_build_project_linux64_ffm

      - name: Build TestLib JNI project
        run: ./gradlew TestLib_build_project_linux64_jni

      - name: Build TestLib FFM project
        run: ./gradlew TestLib_build_project_linux64_ffm

      - name: Run TestLib desktop JNI tests
        run: ./gradlew :examples:TestLib:lib:lib-jni:assemble :examples:TestLib:app:desktop-jni:test --no-daemon --info --console=plain

      - name: Run TestLib desktop FFM tests
        run: ./gradlew :examples:TestLib:lib:lib-ffm:assemble :examples:TestLib:app:desktop-ffm:test --no-daemon --info --console=plain

      - name: Build Shared LibA JNI project
        run: ./gradlew LibA_build_project_linux64_jni

      - name: Build Shared LibA FFM project
        run: ./gradlew LibA_build_project_linux64_ffm

      - name: Build Shared LibB JNI project
        run: ./gradlew LibB_build_project_linux64_jni

      - name: Build Shared LibB FFM project
        run: ./gradlew LibB_build_project_linux64_ffm

      - name: Upload natives runtime
        uses: actions/upload-artifact@v4
        with:
          name: linux-natives
          path: ./idl/runtime/runtime-build/build/c++/libs/

  build_mac_intel:
    name: Build Mac Intel
    runs-on: macos-26-intel

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: 25

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Build project JNI runtime
        run: ./gradlew idl_helper_build_project_mac64_jni

      - name: Build runtime FFM project
        run: ./gradlew idl_helper_build_project_mac64_ffm

      - name: Build TestLib JNI project
        run: |
          ./gradlew TestLib_build_project_mac64_jni

      - name: Build TestLib FFM project
        run: |
          ./gradlew TestLib_build_project_mac64_ffm

      - name: Run TestLib desktop JNI tests
        run: |
          ./gradlew :examples:TestLib:lib:lib-jni:assemble :examples:TestLib:app:desktop-jni:test --no-daemon --info --console=plain

      - name: Run TestLib desktop FFM tests
        run: |
          ./gradlew :examples:TestLib:lib:lib-ffm:assemble :examples:TestLib:app:desktop-ffm:test --no-daemon --info --console=plain

      - name: Build Shared LibA JNI project
        run: |
          ./gradlew LibA_build_project_mac64_jni

      - name: Build Shared LibA FFM project
        run: |
          ./gradlew LibA_build_project_mac64_ffm

      - name: Build Shared LibB JNI project
        run: |
          ./gradlew LibB_build_project_mac64_jni

      - name: Build Shared LibB FFM project
        run: |
          ./gradlew LibB_build_project_mac64_ffm

      - name: Upload natives runtime
        uses: actions/upload-artifact@v4
        with:
          name: mac-natives-intel
          path: ./idl/runtime/runtime-build/build/c++/libs/

  build_mac_arm:
    name: Build Mac Arm
    runs-on: macos-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: 25

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Build project JNI runtime
        run: ./gradlew idl_helper_build_project_macArm_jni

      - name: Build runtime FFM project
        run: ./gradlew idl_helper_build_project_macArm_ffm

      - name: Build TestLib JNI project
        run: |
          ./gradlew TestLib_build_project_macArm_jni

      - name: Build TestLib FFM project
        run: |
          ./gradlew TestLib_build_project_macArm_ffm

      - name: Run TestLib desktop JNI tests
        run: |
          ./gradlew :examples:TestLib:lib:lib-jni:assemble :examples:TestLib:app:desktop-jni:test --no-daemon --info --console=plain

      - name: Run TestLib desktop FFM tests
        run: |
          ./gradlew :examples:TestLib:lib:lib-ffm:assemble :examples:TestLib:app:desktop-ffm:test --no-daemon --info --console=plain

      - name: Build Shared LibA JNI project
        run: |
          ./gradlew LibA_build_project_macArm_jni

      - name: Build Shared LibA FFM project
        run: |
          ./gradlew LibA_build_project_macArm_ffm

      - name: Build Shared LibB JNI project
        run: |
          ./gradlew LibB_build_project_macArm_jni

      - name: Build Shared LibB FFM project
        run: |
          ./gradlew LibB_build_project_macArm_ffm

      - name: Upload natives runtime
        uses: actions/upload-artifact@v4
        with:
          name: mac-natives-arm
          path: ./idl/runtime/runtime-build/build/c++/libs/

  build_web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: 25

      - name: Set up MinGW
        run: |
          sudo apt install -y --force-yes mingw-w64 lib32z1

      - name: Install emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.18

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Build project runtime
        run: ./gradlew idl_helper_build_project_teavm_web

      - name: Build project
        run: ./gradlew TestLib_build_project_teavm_web

      - name: Build Shared LibA project
        run: ./gradlew LibA_build_project_teavm_web

      - name: Build Shared LibB project
        run: ./gradlew LibB_build_project_teavm_web

      - name: Upload natives runtime
        uses: actions/upload-artifact@v4
        with:
          name: web-natives
          path: ./idl/runtime/runtime-build/build/c++/libs/

  build_android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: 25

      - name: Set up MinGW
        run: |
          sudo apt install -y --force-yes mingw-w64 lib32z1

      - name: Install NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          add-to-path: false
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Build project runtime
        run: ./gradlew idl_helper_build_project_android_jni
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build project
        run: ./gradlew TestLib_build_project_android_jni
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build Shared LibA project
        run: ./gradlew LibA_build_project_android_jni
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build Shared LibB project
        run: ./gradlew LibB_build_project_android_jni
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload natives
        uses: actions/upload-artifact@v4
        with:
          name: android-natives
          path: ./idl/runtime/runtime-build/build/c++/libs/

  upload_natives:
    name: Upload Natives
    needs: [build_windows, build_linux, build_mac_intel, build_mac_arm, build_android, build_web]
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        uses: madhead/read-java-properties@latest
        id: version
        with:
          file: "./gradle.properties"
          property: version
          default: 0.0.1

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: 25

      - name: Set up MinGW
        run: |
          sudo apt install -y --force-yes mingw-w64 lib32z1

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Download windows natives runtime
        uses: actions/download-artifact@v4
        with:
          name: windows-natives
          path: ./idl/runtime/runtime-build/build/c++/libs/

      - name: Download linux natives runtime
        uses: actions/download-artifact@v4
        with:
          name: linux-natives
          path: ./idl/runtime/runtime-build/build/c++/libs/

      - name: Download mac intel natives runtime
        uses: actions/download-artifact@v4
        with:
          name: mac-natives-intel
          path: ./idl/runtime/runtime-build/build/c++/libs/

      - name: Download mac arm natives runtime
        uses: actions/download-artifact@v4
        with:
          name: mac-natives-arm
          path: ./idl/runtime/runtime-build/build/c++/libs/

      - name: Download android natives runtime
        uses: actions/download-artifact@v4
        with:
          name: android-natives
          path: ./idl/runtime/runtime-build/build/c++/libs/

      - name: Download web natives runtime
        uses: actions/download-artifact@v4
        with:
          name: web-natives
          path: ./idl/runtime/runtime-build/build/c++/libs/

      - name: Generate Java classes
        run: ./gradlew TestLib_build_project

      - name: Generate runtime project
        run: ./gradlew :idl:runtime:runtime-build:idl_helper_build_project

      - name: Upload Release to repository
        uses: nick-fields/retry@v3
        if: ${{ inputs.shouldUpload && inputs.isRelease }}
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_on: error
          command: ./gradlew publishRelease

      - name: Upload Snapshot to repository
        uses: nick-fields/retry@v3
        if: ${{ inputs.shouldUpload && !inputs.isRelease }}
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_on: error
          command: ./gradlew publishSnapshot

      - name: Create Git tag
        uses: actions/github-script@v7
        if: ${{ inputs.isRelease }}
        with:
          script: |
            const versionOutputs = ${{ toJSON(steps.version.outputs) }};
            
            var version = versionOutputs.value;
            
            console.log("Version: " + version);
            
            var ref = "refs/tags/" + version
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: ref,
              sha: context.sha
            });